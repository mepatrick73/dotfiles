general {
    hide_cursor = true
}

background {
    monitor =
    color = rgba(08080aff)
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 1
    dots_size = 0.28
    dots_spacing = 0.18
    outer_color = rgba(ffffff10)
    inner_color = rgba(08080aee)
    font_color = rgb(192, 200, 208)
    fade_on_empty = true
    placeholder_text = <span foreground="##606878">password</span>
    rounding = 8
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(192, 200, 208, 0.9)
    font_size = 72
    font_family = Noto Sans Mono
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"
    color = rgba(96, 104, 120, 0.9)
    font_size = 18
    font_family = Noto Sans Mono
    position = 0, 40
    halign = center
    valign = center
}
